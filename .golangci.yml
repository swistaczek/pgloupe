version: "2"

linters:
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
    - unconvert
    - unparam

  settings:
    errcheck:
      # Close on net.Conn / net.Listener / *exec.Cmd.Wait during forced
      # teardown is intentional — the proxy doesn't care if the kernel
      # already tore down the socket. Same for pgproto3.Send/Flush — errors
      # are surfaced via the next Receive returning net.ErrClosed.
      exclude-functions:
        - (net.Conn).Close
        - (net.Listener).Close
        - (*github.com/jackc/pgx/v5/pgproto3.Frontend).Send
        - (*github.com/jackc/pgx/v5/pgproto3.Frontend).Flush
        - (*github.com/jackc/pgx/v5/pgproto3.Backend).Send
        - (*github.com/jackc/pgx/v5/pgproto3.Backend).Flush

  exclusions:
    rules:
      # G204 (subprocess with variable input) is the explicit design of the
      # --via tunnel: we exec the system `ssh` binary with user-supplied
      # destination + container args. Inputs are validated by
      # validateSSHTarget / validateDockerName which reject anything that
      # could be parsed as an ssh/docker option (leading `-`, shell
      # metacharacters). All other gosec rules still apply to ssh.go.
      - path: ssh\.go
        linters: [gosec]
        text: "G204"

      # gosec G104 (errors unhandled) duplicates errcheck on net.Conn.Close
      # in deferred teardown paths; we already silence those via
      # errcheck.exclude-functions above.
      - linters: [gosec]
        text: "G104"
        source: "Close\\("

      # Tests are noisier on errcheck/gosec; we already assert outcomes.
      - path: _test\.go
        linters: [errcheck, gosec]
